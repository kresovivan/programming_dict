<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 Изучение слов по карточкам</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <header class="header">
            <h1>📖 Изучение слов по карточкам</h1>
        </header>

        <!-- Прогресс карточек -->
        <div class="card-progress" id="cardProgress">
            1/{{ terms|length }}
        </div>

        <!-- Карточка -->
        <div class="learning-card" id="learningCard">
            <div class="card-term-header">
                <div class="card-term" id="cardTerm">
                    {{ terms[0].term if terms else 'Нет терминов' }}
                </div>
                {% if terms and terms[0].alphabet %}
                <div class="card-alphabet">
                    {{ terms[0].alphabet }}
                </div>
                {% endif %}
            </div>
            
            <div class="card-answer" id="cardAnswer" style="display: none;">
                <div class="card-translation" id="cardTranslation">
                    Перевод: {{ terms[0].translation if terms else '' }}
                </div>
                <div class="card-definition" id="cardDefinition">
                    Определение: {{ terms[0].definition if terms else '' }}
                </div>
            </div>
        </div>

        <!-- Кнопки управления -->
        <div class="card-controls">
            <button class="card-btn prev-btn" onclick="previousCard()" id="prevBtn">
                ⬅️ Назад
            </button>
            
            <button class="card-btn show-btn" onclick="toggleAnswer()" id="showBtn">
                🔍 Показать ответ
            </button>
            
            <button class="card-btn next-btn" onclick="nextCard()" id="nextBtn">
                Вперед ➡️
            </button>
        </div>

        <!-- Кнопка выхода -->
        <div class="exit-container">
            <!-- Кнопка для возврата на главную страницу с сохранением фильтров -->
            <a href="/{% if request.args %}?{% endif %}{% if request.args.get('category') %}category={{ request.args.get('category') }}&{% endif %}{% if request.args.get('alphabet') %}alphabet={{ request.args.get('alphabet') }}&{% endif %}{% if request.args.get('search') %}search={{ request.args.get('search') }}{% endif %}" 
               class="exit-btn-link">
                <button class="exit-btn">
                    ↩️ Назад к словарю
                </button>
            </a>
        </div>
    </div>

    <script>
        let currentIndex = 0;
        let showAnswer = false;
        const terms = {{ terms|tojson }};

        function updateCard() {
            if (terms.length === 0) return;
            
            const term = terms[currentIndex];
            document.getElementById('cardTerm').textContent = term.term;
            document.getElementById('cardTranslation').textContent = `Перевод: ${term.translation}`;
            document.getElementById('cardDefinition').textContent = `Определение: ${term.definition}`;
            document.getElementById('cardProgress').textContent = `${currentIndex + 1}/${terms.length}`;
            
            // Обновляем букву алфавита (если есть элемент)
            const alphabetElement = document.querySelector('.card-alphabet');
            if (alphabetElement && term.alphabet) {
                alphabetElement.textContent = term.alphabet;
                alphabetElement.style.display = 'block';
            } else if (alphabetElement && !term.alphabet) {
                alphabetElement.style.display = 'none';
            }
            
            // Скрыть ответ
            document.getElementById('cardAnswer').style.display = 'none';
            document.getElementById('showBtn').textContent = '🔍 Показать ответ';
            showAnswer = false;
        }

        function toggleAnswer() {
            showAnswer = !showAnswer;
            const answerElement = document.getElementById('cardAnswer');
            const showBtn = document.getElementById('showBtn');
            
            if (showAnswer) {
                answerElement.style.display = 'block';
                showBtn.textContent = '🙈 Скрыть ответ';
            } else {
                answerElement.style.display = 'none';
                showBtn.textContent = '🔍 Показать ответ';
            }
        }

        function nextCard() {
            if (terms.length === 0) return;
            currentIndex = (currentIndex + 1) % terms.length;
            updateCard();
        }

        function previousCard() {
            if (terms.length === 0) return;
            currentIndex = (currentIndex - 1 + terms.length) % terms.length;
            updateCard();
        }

        // Горячие клавиши
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') nextCard();
            if (event.key === 'ArrowLeft') previousCard();
            if (event.key === ' ') {
                event.preventDefault();
                toggleAnswer();
            }
            if (event.key === 'Escape') {
                // При нажатии ESC возвращаемся на главную страницу
                const returnUrl = "/{% if request.args %}?{% endif %}{% if request.args.get('category') %}category={{ request.args.get('category') }}&{% endif %}{% if request.args.get('alphabet') %}alphabet={{ request.args.get('alphabet') }}&{% endif %}{% if request.args.get('search') %}search={{ request.args.get('search') }}{% endif %}";
                window.location.href = returnUrl;
            }
        });

        // Инициализация
        updateCard();
    </script>
</body>
</html>
