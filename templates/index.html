<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Словарь для начинающих программистов</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>
                <img src="/static/favicon.png"
                     alt="Словарь для начинающих программистов" width="32" height="32" class="header-icon">
                Словарь для начинающих программистов
            </h1>
        </header>

        <!-- Блок статистики -->
        <div class="stats-container">
            <div class="total-terms">
                📊 Всего загружено терминов: <strong>{{ progress_total }}</strong>
            </div>
        </div>

        <!-- Панель управления -->
        <div class="control-panel">
            <div class="filter-group">
                <label for="category">Категория:</label>
                <select id="category" class="form-control">
                    <option value="Все">Все</option>
                    {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="search-group">
                <label for="search">Поиск:</label>
                <input type="text" id="search" placeholder="Введите термин..." class="form-control">
            </div>
        </div>

        <!-- Кнопка режима обучения -->
        <div class="learning-btn-container">
            <button class="learning-btn" onclick="startLearningMode()">
                📖 Режим обучения
            </button>
        </div>

        <!-- Список терминов -->
        <div class="terms-container" id="termsContainer">
            {% for term in terms %}
            <div class="term-card">
                <div class="term-header">
                    <span class="term-name">🔹 {{ term.term }}</span>
                </div>
                <div class="term-translation">Перевод: {{ term.translation }}</div>
                <div class="term-meta">
                    Категория: {{ term.category }} | Уровень: {{ term.level }}
                </div>
                <div class="term-definition">Определение: {{ term.definition }}</div>
            </div>
            {% endfor %}
        </div>
        
        <!-- Сообщение о пустом результате -->
        <div class="no-results" id="noResults" style="display: none;">
            Термины не найдены
        </div>
    </div>

    <script>
        // Фильтрация терминов
        function filterTerms() {
            const category = document.getElementById('category').value;
            const search = document.getElementById('search').value;
            const noResults = document.getElementById('noResults');

            fetch(`/filter?category=${encodeURIComponent(category)}&search=${encodeURIComponent(search)}`)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('termsContainer');
                    container.innerHTML = '';

                    if (data.terms.length === 0) {
                        noResults.style.display = 'block';
                        container.style.display = 'none';
                        return;
                    }

                    noResults.style.display = 'none';
                    container.style.display = 'block';

                    data.terms.forEach(term => {
                        const termCard = document.createElement('div');
                        termCard.className = 'term-card';
                        termCard.innerHTML = `
                            <div class="term-header">
                                <span class="term-name">🔹 ${term.term}</span>
                            </div>
                            <div class="term-translation">Перевод: ${term.translation}</div>
                            <div class="term-meta">
                                Категория: ${term.category} | Уровень: ${term.level}
                            </div>
                            <div class="term-definition">Определение: ${term.definition}</div>
                        `;
                        container.appendChild(termCard);
                    });
                })
                .catch(error => {
                    console.error('Ошибка фильтрации:', error);
                });
        }

        // Запуск режима обучения
        function startLearningMode() {
            const category = document.getElementById('category').value;
            const search = document.getElementById('search').value;
            window.location.href = `/learning?category=${encodeURIComponent(category)}&search=${encodeURIComponent(search)}`;
        }

        // Оптимизация событий с debounce для поиска
        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterTerms, 300);
        }

        // События
        document.getElementById('category').addEventListener('change', filterTerms);
        document.getElementById('search').addEventListener('input', handleSearch);
        
        // Обработка клавиши Enter в поиске
        document.getElementById('search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                filterTerms();
            }
        });
    </script>
</body>
</html>
